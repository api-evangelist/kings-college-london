aid: kings-college-london
name: King's College London
description: >-
  King's College London (KCL) is a public research university in London, United
  Kingdom, ranked #41 in the QS World University Rankings 2025. Like most
  research universities, King's does not operate a centralized public developer
  portal; its machine-readable footprint is concentrated in research and library
  infrastructure. The King's Research Portal (Pure) exposes a live OAI-PMH
  metadata interface, and the King's research data repository is hosted on
  Figshare, which provides a public REST API and OAI-PMH endpoint. King's also
  runs an e-Research group with a large public GitHub organization.
