  - date: '2026-06-03'
    rating: 2
    summary: >-
      King's College London has no centralized public developer portal. Its
      verifiable machine-readable footprint is research and library
      infrastructure: the King's Research Portal (Pure) returns a live OAI-PMH
      response (HTTP 200, repositoryName "Pure OAI Repository"), and the King's
      research data repository is hosted on Figshare, whose public REST API and
      OAI-PMH endpoints both responded 200. The e-Research GitHub org
      (kcl-eresearch, ~86 repos) was confirmed. No endpoints were fabricated;
      only URLs that resolved live are cataloged.
